<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Tumor Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #1c1c1e;
      --panel:     #2a2a2e;
      --border:    #3a3a3f;
      --text:      #dcdce0;
      --muted:     #8a8a8f;
      --btn-bg:    #3a3a3f;
      --btn-hover: #4a4a4f;
      --green:     #3cb55a;
      --red:       #dc3c3c;
      --bar-track: #3a3a3f;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    body { display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .topbar-title { font-size: 14px; font-weight: 600; letter-spacing: 0.1px; }
    .model-badge {
      margin-left: auto; font-size: 12px; color: var(--green);
      display: flex; align-items: center; gap: 5px;
    }
    .badge-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .workspace { flex: 1; display: flex; flex-direction: column; padding: 14px 16px 0; gap: 10px; }

    .action-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .btn {
      padding: 5px 14px;
      background: var(--btn-bg); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.12s; white-space: nowrap;
    }
    .btn:hover:not(:disabled) { background: var(--btn-hover); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .filename-label { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 340px; }

    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; }

    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; display: flex; flex-direction: column; }
    .panel-header { padding: 6px 12px; border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .panel-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; min-height: 300px; }

    .placeholder { color: var(--muted); font-size: 12px; text-align: center; }
    .placeholder-icon { font-size: 32px; margin-bottom: 8px; }

    #previewImg { display: none; max-width: 100%; max-height: 320px; object-fit: contain; border-radius: 2px; }

    .result-body { flex-direction: column; align-items: flex-start; justify-content: flex-start; padding: 20px; }
    .result-empty { color: var(--muted); font-size: 12px; margin: auto; align-self: center; }
    .result-content { display: none; width: 100%; }
    .result-content.visible { display: block; }

    .result-main { font-size: 19px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
    .result-main.tumor    { color: var(--red); }
    .result-main.no-tumor { color: var(--green); }

    .conf-heading { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }

    .conf-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .conf-label { width: 68px; font-size: 12px; color: var(--muted); flex-shrink: 0; }
    .bar-track { flex: 1; height: 6px; background: var(--bar-track); border-radius: 3px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; width: 0%; transition: width 0.5s ease; }
    .bar-fill.green { background: var(--green); }
    .bar-fill.red   { background: var(--red); }
    .conf-pct { width: 36px; text-align: right; font-size: 12px; font-variant-numeric: tabular-nums; color: var(--text); }

    .spinner { display: none; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
    .spinner.visible { display: flex; }
    .spin-ring { width: 14px; height: 14px; flex-shrink: 0; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .statusbar { margin-top: auto; padding: 5px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--muted); }
    .statusbar-error { color: var(--red); }

    #fileInput { display: none; }

    @media (max-width: 600px) {
      .panels { grid-template-columns: 1fr; }
      .panel-body { min-height: 200px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <span style="font-size:15px;">🧠</span>
    <span class="topbar-title">Brain Tumor Detector</span>
    <div class="model-badge" id="modelBadge">
      <span class="badge-dot"></span>
      <span>Model ready</span>
    </div>
  </div>

  <div class="workspace">
    <div class="action-row">
      <button class="btn" onclick="document.getElementById('fileInput').click()">📂&nbsp; Select Brain MRI Image</button>
      <button class="btn" id="analyzeBtn" onclick="analyze()" disabled>🔍&nbsp; Analyse</button>
      <div class="spinner" id="spinner"><div class="spin-ring"></div>&nbsp;Analysing…</div>
      <span class="filename-label" id="filenameLabel"></span>
      <input type="file" id="fileInput" accept="image/*" onchange="handleFile(this.files[0])" />
    </div>

    <div class="panels">
      <div class="panel">
        <div class="panel-header">Preview</div>
        <div class="panel-body" id="previewPanel">
          <div class="placeholder" id="placeholder">
            <div class="placeholder-icon">🖼</div>
            No image selected
          </div>
          <img id="previewImg" src="" alt="MRI scan" />
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">Result</div>
        <div class="panel-body result-body">
          <div class="result-empty" id="resultEmpty">Select an image to see the prediction.</div>
          <div class="result-content" id="resultContent">
            <div class="result-main" id="resultMain"></div>
            <div class="conf-heading">Confidence</div>
            <div class="conf-row">
              <span class="conf-label">No Tumor</span>
              <div class="bar-track"><div class="bar-fill green" id="barNo"></div></div>
              <span class="conf-pct" id="pctNo">0%</span>
            </div>
            <div class="conf-row">
              <span class="conf-label">Tumor</span>
              <div class="bar-track"><div class="bar-fill red" id="barYes"></div></div>
              <span class="conf-pct" id="pctYes">0%</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="statusbar"><span id="statusText">Model loaded. Select an image to detect.</span></div>

  <script>
    let selectedFile = null;

    function handleFile(file) {
      if (!file) return;
      selectedFile = file;
      const img = document.getElementById('previewImg');
      img.src = URL.createObjectURL(file);
      img.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
      document.getElementById('filenameLabel').textContent = file.name;
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('resultEmpty').style.display = 'block';
      document.getElementById('resultContent').classList.remove('visible');
      setStatus(file.name);
    }

    async function analyze() {
      if (!selectedFile) return;
      document.getElementById('analyzeBtn').disabled = true;
      document.getElementById('spinner').classList.add('visible');
      document.getElementById('resultEmpty').style.display = 'none';
      document.getElementById('resultContent').classList.remove('visible');
      setStatus('Analysing…');
      const form = new FormData();
      form.append('image', selectedFile);
      try {
        const res = await fetch('/predict', { method: 'POST', body: form });
        if (!res.ok) throw new Error(await res.text());
        showResult(await res.json());
        setStatus(selectedFile.name);
      } catch (err) {
        setStatus('Error: ' + err.message, true);
        document.getElementById('resultEmpty').style.display = 'block';
      } finally {
        document.getElementById('analyzeBtn').disabled = false;
        document.getElementById('spinner').classList.remove('visible');
      }
    }

    function showResult(data) {
      const mainEl = document.getElementById('resultMain');
      mainEl.className = 'result-main ' + (data.is_tumor ? 'tumor' : 'no-tumor');
      mainEl.textContent = (data.is_tumor ? '🔴 ' : '🟢 ') + data.label;
      const no  = Math.round(data.prob_no  * 100);
      const yes = Math.round(data.prob_yes * 100);
      document.getElementById('barNo').style.width  = no  + '%';
      document.getElementById('pctNo').textContent  = no  + '%';
      document.getElementById('barYes').style.width = yes + '%';
      document.getElementById('pctYes').textContent = yes + '%';
      document.getElementById('resultEmpty').style.display = 'none';
      document.getElementById('resultContent').classList.add('visible');
    }

    function setStatus(msg, isError) {
      const el = document.getElementById('statusText');
      el.textContent = msg;
      el.className = isError ? 'statusbar-error' : '';
    }

    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });
  </script>
</body>
</html>
